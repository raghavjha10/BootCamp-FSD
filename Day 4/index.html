<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyPulse — Live Weather</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated sky background layers -->
  <div class="sky-bg" id="skyBg">
    <div class="sky-layer layer1"></div>
    <div class="sky-layer layer2"></div>
    <div class="stars" id="stars"></div>
    <div class="clouds" id="clouds"></div>
    <div class="rain-container" id="rainContainer"></div>
  </div>

  <main class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">SkyPulse</span>
      </div>
      <p class="tagline">Real-time weather intelligence</p>
    </header>

    <!-- Search -->
    <div class="search-section">
      <div class="search-box" id="searchBox">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="searchBtn" onclick="fetchWeather()">
          <span>Search</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
      <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- Weather card (hidden until data loads) -->
    <div class="weather-card glass" id="weatherCard">

      <!-- Top: Location & date -->
      <div class="card-top">
        <div class="location-block">
          <h1 class="city-name" id="cityName">—</h1>
          <p class="country-date" id="countryDate">—</p>
        </div>
        <div class="condition-block">
          <div class="weather-icon-big" id="weatherIconBig">🌤</div>
          <p class="condition-label" id="conditionLabel">—</p>
        </div>
      </div>

      <!-- Hero temp -->
      <div class="temp-hero">
        <span class="temp-value" id="tempValue">—</span>
        <div class="temp-meta">
          <span class="temp-unit" id="tempUnit">°C</span>
          <button class="unit-toggle" id="unitToggle" onclick="toggleUnit()">Switch to °F</button>
        </div>
      </div>

      <!-- Feels like strip -->
      <div class="feels-strip">
        <span>Feels like <strong id="feelsLike">—</strong></span>
        <span class="dot">·</span>
        <span id="tempRange">—</span>
      </div>

      <!-- Detail grid -->
      <div class="detail-grid">
        <div class="detail-card">
          <div class="d-icon">💧</div>
          <div class="d-value" id="humidity">—</div>
          <div class="d-label">Humidity</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">🌬</div>
          <div class="d-value" id="windSpeed">—</div>
          <div class="d-label">Wind</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">👁</div>
          <div class="d-value" id="visibility">—</div>
          <div class="d-label">Visibility</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">🧭</div>
          <div class="d-value" id="pressure">—</div>
          <div class="d-label">Pressure</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">☁</div>
          <div class="d-value" id="cloudiness">—</div>
          <div class="d-label">Cloud Cover</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">🌅</div>
          <div class="d-value" id="sunrise">—</div>
          <div class="d-label">Sunrise</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">🌇</div>
          <div class="d-value" id="sunset">—</div>
          <div class="d-label">Sunset</div>
        </div>
        <div class="detail-card">
          <div class="d-icon">💨</div>
          <div class="d-value" id="windDir">—</div>
          <div class="d-label">Wind Dir.</div>
        </div>
      </div>

      <!-- UV / AQI bar -->
      <div class="extra-strip">
        <div class="extra-item">
          <span class="extra-label">UV Index</span>
          <div class="bar-track"><div class="bar-fill uv-bar" id="uvBar"></div></div>
          <span class="extra-val" id="uvVal">—</span>
        </div>
        <div class="extra-item">
          <span class="extra-label">Wind Gusts</span>
          <span class="extra-val" id="gusts">—</span>
        </div>
      </div>

    </div>

    <!-- Loading state -->
    <div class="loader-ring" id="loader">
      <div class="ring"></div>
      <p>Fetching sky data…</p>
    </div>

    <footer class="app-footer">
      Powered by OpenWeatherMap · Enter your API key in <code>app.js</code>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
